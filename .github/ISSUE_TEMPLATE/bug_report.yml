name: 🐛 Bug Report
description: Report something that isn't working correctly
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug Report

        Thanks for reporting an issue!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug clearly
      placeholder: |
        A clear description of the bug.
        - What happened?
        - What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the bug?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context that might help (screenshots, browser, OS)
      placeholder: |
        - Browser/OS:
        - Screenshots:
        - Any other relevant info:
